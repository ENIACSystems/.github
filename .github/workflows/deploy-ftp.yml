name: Deploy — FTP Delta Sync

on:
  workflow_call:
    inputs:
      server-dir:
        description: 'Remote directory on FTP server (e.g., /public_html/projects/rabbit/)'
        required: true
        type: string
      exclude-patterns:
        description: 'Files/dirs to exclude (newline-separated)'
        required: false
        type: string
        default: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/.env
          **/storage/logs/**
          **/storage/framework/cache/**
    secrets:
      FTP_SERVER:
        required: true
      FTP_USERNAME:
        required: true
      FTP_PASSWORD:
        required: true
      GH_PAT:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Clone shared-lib (sibling directory for path repository)
        run: git clone --depth 1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/ENIACSystems/shared-lib.git ../shared-lib

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring

      - name: Install Composer (production)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate .env from secrets
        run: |
          echo "APP_ENV=production" > .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY || '' }}" >> .env

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends lftp

      - name: Create deploy package
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='.git*' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            -C . .

      - name: Create untar helper script
        run: |
          cat > /tmp/_untar_deploy.php <<'PHPEOF'
          <?php
          // Self-deleting deploy unpack + post-deploy setup script
          $dir = __DIR__;
          $tar = $dir . '/_deploy.tar.gz';
          if (!file_exists($tar)) { http_response_code(404); die('No archive found'); }

          // 1. Untar
          $out = [];
          exec("cd " . escapeshellarg($dir) . " && tar xzf _deploy.tar.gz 2>&1", $out, $rc);
          unlink($tar);

          // 2. Ensure required storage directories exist
          foreach (['storage/framework/cache', 'storage/framework/sessions', 'storage/framework/views', 'storage/logs'] as $d) {
              $p = $dir . '/' . $d;
              if (!is_dir($p)) { mkdir($p, 0755, true); $out[] = "Created $d"; }
          }

          // 3. Generate .env if missing (with random APP_KEY)
          $envFile = $dir . '/.env';
          if (!file_exists($envFile)) {
              $key = 'base64:' . base64_encode(random_bytes(32));
              $script = dirname($_SERVER['SCRIPT_NAME'] ?? '');
              $parts = explode('/', trim($script, '/'));
              $name = end($parts) ?: 'app';
              $env  = "APP_NAME=\"$name\"\nAPP_ENV=production\nAPP_KEY=$key\n";
              $env .= "APP_DEBUG=false\nAPP_URL=https://eniacsystems.com.br/app/$name\n\n";
              $env .= "LOG_CHANNEL=single\nLOG_LEVEL=warning\n";
              file_put_contents($envFile, $env);
              $out[] = "Generated .env with new APP_KEY";
          }

          unlink(__FILE__);
          http_response_code($rc === 0 ? 200 : 500);
          echo json_encode(['rc' => $rc, 'output' => $out]);
          PHPEOF

      - name: Upload archive + untar script via lftp
        run: |
          cat > /tmp/lftp-upload.cmd <<LFTP_CMDS
          set ssl:verify-certificate no
          set ftp:ssl-allow true
          set ftp:ssl-force true
          set ftp:ssl-auth TLS
          set ftp:ssl-protect-data true
          set ftp:ssl-protect-list true
          set ftp:passive-mode true
          set ftp:fix-pasv-address true
          set ftp:prefer-epsv false
          set net:timeout 120
          set net:max-retries 3
          set net:reconnect-interval-base 5
          open -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" -p 21 "${{ secrets.FTP_SERVER }}"
          mkdir -p ${{ inputs.server-dir }}
          cd ${{ inputs.server-dir }}
          put /tmp/deploy.tar.gz -o _deploy.tar.gz
          put /tmp/_untar_deploy.php -o _untar_deploy.php
          bye
          LFTP_CMDS
          lftp -f /tmp/lftp-upload.cmd

      - name: Unpack archive on server
        run: |
          # Derive the public URL from server-dir
          # server-dir format: /public_html/projects/xxx/
          REL_PATH=$(echo "${{ inputs.server-dir }}" | sed 's|^/public_html/||; s|/$||')
          URL="https://eniacsystems.com.br/${REL_PATH}/_untar_deploy.php"
          echo "Triggering unpack at: ${URL}"
          HTTP_CODE=$(curl -sL -o /tmp/untar_response.txt -w '%{http_code}' --max-time 120 "${URL}" || true)
          cat /tmp/untar_response.txt
          echo ""
          echo "HTTP status: ${HTTP_CODE}"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::warning::Unpack returned HTTP ${HTTP_CODE} — you may need to run _untar_deploy.php manually"
          fi
