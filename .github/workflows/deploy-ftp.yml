name: Deploy — FTP Delta Sync

on:
  workflow_call:
    inputs:
      server-dir:
        description: 'Remote directory on FTP server (e.g., /public_html/projects/rabbit/)'
        required: true
        type: string
      exclude-patterns:
        description: 'Files/dirs to exclude (newline-separated)'
        required: false
        type: string
        default: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          **/.env
          **/storage/logs/**
          **/storage/framework/cache/**
    secrets:
      FTP_SERVER:
        required: true
      FTP_USERNAME:
        required: true
      FTP_PASSWORD:
        required: true
      GH_PAT:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Clone shared-lib (sibling directory for path repository)
        run: git clone --depth 1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/ENIACSystems/shared-lib.git ../shared-lib

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring

      - name: Install Composer (production)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate .env from secrets
        run: |
          echo "APP_ENV=production" > .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY || '' }}" >> .env

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: FTP Deploy (lftp mirror)
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}" <<'LFTPSCRIPT'
          set ftp:passive-mode true
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set mirror:parallel-transfer-count 5
          mirror -R --delete --verbose \
            --exclude-glob .git* \
            --exclude-glob node_modules/ \
            --exclude-glob tests/ \
            --exclude-glob .env \
            --exclude-glob storage/logs/ \
            --exclude-glob storage/framework/cache/ \
            . ${{ inputs.server-dir }}
          quit
          LFTPSCRIPT
