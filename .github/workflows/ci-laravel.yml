name: CI  Laravel Lint & Test

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: false
        type: string
        default: '8.2'
    secrets:
      GH_PAT:
        required: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone shared-lib (private dependency)
        env:
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$TOKEN" ]; then
            git clone --depth 1 https://x-access-token:${TOKEN}@github.com/ENIACSystems/shared-lib.git ../shared-lib
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, pdo_mysql, bcmath, intl
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for tests
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Laravel Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: PHPUnit (tests)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password
        run: |
          php artisan migrate --force
          vendor/bin/phpunit --coverage-text